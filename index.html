<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Timesheet</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div id="controls">
        <div class="toolbar-section">
            <div class="control-row">
                <div class="input-group">
                    <label for="frameInterval">Interval</label>
                    <div class="number-input-wrapper">
                        <input type="number" id="frameInterval" value="6" min="1" max="24">
                        <div class="spinner-arrows">
                            <div class="spinner-up">
                                <svg width="8" height="5" viewBox="0 0 10 6" fill="none">
                                    <path d="M1 5L5 1L9 5" stroke="currentColor" stroke-width="1.5"
                                        stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                            </div>
                            <div class="spinner-down">
                                <svg width="8" height="5" viewBox="0 0 10 6" fill="none">
                                    <path d="M9 1L5 5L1 1" stroke="currentColor" stroke-width="1.5"
                                        stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label for="keyframeType">Type</label>
                    <div class="select-wrapper">
                        <select id="keyframeType">
                            <option value="hold">Hold</option>
                            <option value="linear">Linear</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="headerMode">Header</label>
                    <div class="select-wrapper">
                        <select id="headerMode">
                            <option value="alpha">Alphabetical</option>
                            <option value="layer">Layer Name</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="toolbar-section">
            <div class="control-row">
                <button class="btn btn-primary" id="syncBtn">Sync</button>
                <button class="btn btn-ghost" id="clearBtn">Clear</button>
                <button class="btn btn-ghost" id="removeAllBtn">Remove All</button>
                <span class="toolbar-divider"></span>
                <button class="btn btn-ghost" id="exportBtn">Export</button>
                <button class="btn btn-ghost" id="importBtn">Import</button>
                <span class="toolbar-divider"></span>
                <div class="toggle-wrapper">
                    <input type="checkbox" id="reindexToggle">
                    <label for="reindexToggle" class="toggle-label">Re-index</label>
                </div>
            </div>
        </div>

        <div class="toolbar-section">
            <div class="control-row">
                <div class="input-group cam-input-group">
                    <label for="camWidth">Cam</label>
                    <input type="number" class="cam-input" id="camWidth" value="1920" min="1" max="99999">
                    <span class="cam-sep">&times;</span>
                    <input type="number" class="cam-input" id="camHeight" value="1080" min="1" max="99999">
                </div>
                <button class="btn btn-ghost" id="importCamXdtsBtn">Import Camera</button>
                <button class="btn btn-ghost" id="newCompFromSelBtn">Camera Link</button>
            </div>
        </div>
    </div>

    <div id="tableContainer">
        <table id="timesheetTable">
            <thead>
                <tr id="headerRow">
                    <th style="width: 50px;">Frame</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

    <div class="modal-overlay" id="cameraCompModal">
        <div class="modal-box">
            <button class="modal-close" id="cameraCompClose">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M2 2L12 12M12 2L2 12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
                </svg>
            </button>
            <div class="modal-label">Camera Link</div>
            <div class="modal-options">
                <button class="modal-option" data-mode="comp">
                    <span class="modal-option-label">Comp</span>
                    <span class="modal-option-desc">New comp from selection with camera link</span>
                </button>
                <button class="modal-option" data-mode="link">
                    <span class="modal-option-label">Link</span>
                    <span class="modal-option-desc">Add camera expressions to selected layers</span>
                </button>
            </div>
        </div>
    </div>

    <div id="status">Ready</div>

    <script src="js/host-funcs.js"></script>
    <script src="js/CSInterface.js"></script>
    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/selection.js"></script>
    <script src="js/keyframe.js"></script>
    <script src="js/export-import.js"></script>
    <script src="js/events.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
