<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Timesheet</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div id="controls">
        <div class="control-row">
            <div class="input-group">
                <label for="frameInterval">Interval</label>
                <div class="number-input-wrapper">
                    <input type="number" id="frameInterval" value="6" min="1" max="24">
                    <div class="spinner-arrows">
                        <div class="spinner-up">
                            <svg width="8" height="5" viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M1 5L5 1L9 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                    stroke-linejoin="round" />
                            </svg>
                        </div>
                        <div class="spinner-down">
                            <svg width="8" height="5" viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M9 1L5 5L1 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                    stroke-linejoin="round" />
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label for="keyframeType">Type</label>
                <div class="select-wrapper">
                    <select id="keyframeType">
                        <option value="hold">Hold</option>
                        <option value="linear">Linear</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label for="headerMode">Header</label>
                <div class="select-wrapper">
                    <select id="headerMode">
                        <option value="alpha">Alphabetical</option>
                        <option value="layer">Layer Name</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="control-row">
            <button id="syncBtn">Sync</button>
            <button id="clearBtn">Clear</button>
            <button id="removeAllBtn">Remove All</button>
            <button id="exportBtn">Export</button>
            <button id="importBtn">Import</button>
        </div>
    </div>

    <div id="tableContainer">
        <table id="timesheetTable">
            <thead>
                <tr id="headerRow">
                    <th style="width: 50px;">Frame</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

    <div id="status">Ready</div>

    <script src="js/CSInterface.js"></script>
    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/selection.js"></script>
    <script src="js/keyframe.js"></script>
    <script src="js/export-import.js"></script>
    <script src="js/events.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
