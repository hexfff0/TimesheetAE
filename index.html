<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Timesheet</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div id="controls">
        <div class="control-row">
            <label style="min-width: 5px;">Interval:</label>
            <input type="number" id="frameInterval" value="6" min="1" max="24">
            <label style="min-width: 5px;">Type:</label>
            <select id="keyframeType">
                <option value="hold">Hold</option>
                <option value="linear">Linear</option>
            </select>
            <label style="min-width: 5px;">Header:</label>
            <select id="headerMode">
                <option value="alpha">Alphabetical</option>
                <option value="layer">Layer Name</option>
            </select>
        </div>
        <div class="control-row">
            <button id="syncBtn">Sync</button>
            <button id="clearBtn">Clear</button>
            <button id="removeAllBtn">Remove All</button>
            <button id="exportBtn">Export</button>
            <button id="importBtn">Import</button>
        </div>
    </div>

    <div id="tableContainer">
        <table id="timesheetTable">
            <thead>
                <tr id="headerRow">
                    <th style="width: 50px;">Frame</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

    <div id="status">Ready</div>

    <script src="js/CSInterface.js"></script>
    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/selection.js"></script>
    <script src="js/keyframe.js"></script>
    <script src="js/export-import.js"></script>
    <script src="js/events.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
